<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https://api.jsonbin.io https://fonts.googleapis.com https://fonts.gstatic.com https://cdnjs.cloudflare.com https://script.google.com https://script.googleusercontent.com;">
<title>Money Lending Index Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0F1117;
    --surface: #1A1D27;
    --surface2: #22263A;
    --surface3: #2A2F45;
    --border: #2E3450;
    --border2: #3D4468;
    --text: #F0F2FF;
    --text2: #9BA3C8;
    --text3: #5C6491;
    --accent: #6C63FF;
    --accent2: #FF6B9D;
    --accent-light: rgba(108,99,255,0.15);
    --accent-dark: #4B44CC;
    --green: #00D4AA;
    --green-light: rgba(0,212,170,0.12);
    --amber: #FFB547;
    --amber-light: rgba(255,181,71,0.12);
    --red: #FF5C7D;
    --red-light: rgba(255,92,125,0.12);
    --purple: #B97FFF;
    --purple-light: rgba(185,127,255,0.12);
    --radius: 12px;
    --radius-lg: 20px;
    --radius-xl: 28px;
    --shadow: 0 4px 24px rgba(0,0,0,0.4);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.5), 0 16px 48px rgba(0,0,0,0.3);
    --glow-accent: 0 0 24px rgba(123,114,245,0.3);
    --state-hover: rgba(123,114,245,0.08);
    --state-active: rgba(123,114,245,0.14);
    --glow-accent: 0 0 20px rgba(108,99,255,0.25);
    --glow-green: 0 0 20px rgba(0,212,170,0.2);
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    background-image:
      linear-gradient(rgba(108,99,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: linear-gradient(135deg, #13162B 0%, #0F1117 60%, #1A0F2E 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 200;
    overflow: visible;
    backdrop-filter: blur(12px);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #fff;
  }

  .logo-icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    box-shadow: var(--glow-accent);
  }

  .logo-text { font-size: 17px; font-weight: 600; letter-spacing: -0.02em; color: #fff; }
  .logo-sub { font-size: 12px; color: rgba(255,255,255,0.45); font-weight: 300; }

  .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .header-utils { display: none !important; } /* all screens use hamburger now */
  .header-date { font-size: 12px; color: rgba(255,255,255,0.4); font-family: 'JetBrains Mono', monospace; }

  .main { max-width: 1400px; margin: 0 auto; padding: 32px 40px 80px; }

  .summary-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-xl);
    padding: 20px 22px;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
  }
  .stat::after {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--state-hover);
    opacity: 0;
    transition: opacity 0.2s;
    border-radius: inherit;
    pointer-events: none;
  }
  .stat:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }

  .stat::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--border);
  }
  .stat::after {
    content: '';
    position: absolute;
    bottom: 0; right: 0;
    width: 80px; height: 80px;
    border-radius: 50%;
    opacity: 0.06;
    transform: translate(20px, 20px);
  }

  .stat.accent::before { background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .stat.accent::after { background: var(--accent); }
  .stat.green::before { background: var(--green); }
  .stat.green::after { background: var(--green); }
  .stat.amber::before { background: var(--amber); }
  .stat.amber::after { background: var(--amber); }

  .stat-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; font-weight: 600; }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--text); font-family: 'JetBrains Mono', monospace; letter-spacing: -0.02em; }
  .stat-value.red { color: var(--red); }
  .stat-value.green { color: var(--green); }

  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }

  .section-title { font-size: 13px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.09em; }

  .add-btn {
    display: flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    color: #fff;
    border: none;
    border-radius: var(--radius);
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    transition: all 0.2s;
    letter-spacing: 0.01em;
    box-shadow: 0 4px 15px rgba(108,99,255,0.3);
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  .add-btn:hover { background: var(--accent-dark); box-shadow: var(--glow-accent); }
  .add-btn:active { transform: scale(0.97); }
  .add-btn svg { width: 15px; height: 15px; }



  /* Backup & restore */
  .backup-btn {
    display: flex; align-items: center; gap: 5px;
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.6);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--radius);
    padding: 9px 14px;
    font-size: 12px; font-weight: 500; cursor: pointer;
    font-family: 'Outfit', sans-serif; transition: all 0.2s;
  }
  .backup-btn:hover { background: rgba(255,255,255,0.13); color: #fff; }



  /* Share & Statement buttons */
  .share-btn     { background: none; border: none; cursor: pointer; color: var(--text3); padding: 6px 9px; border-radius: 7px; transition: all 0.12s; font-size: 14px; line-height: 1; }
  .share-btn:hover { background: rgba(108,99,255,0.15); color: var(--accent); transform: scale(1.1); }
  .stmt-btn      { background: none; border: none; cursor: pointer; color: var(--text3); padding: 6px 9px; border-radius: 7px; transition: all 0.12s; font-size: 14px; line-height: 1; }
  .stmt-btn:hover  { background: rgba(0,212,170,0.12); color: var(--green); transform: scale(1.1); }

  /* Google Sheets sync */
  .sheets-sync-btn {
    display: flex; align-items: center; gap: 5px;
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.6);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--radius);
    padding: 9px 14px;
    font-size: 12px; font-weight: 500; cursor: pointer;
    font-family: 'Outfit', sans-serif; transition: all 0.2s;
  }
  .sheets-sync-btn:hover { background: rgba(255,255,255,0.13); color: #fff; }
  .sheets-sync-btn.syncing { opacity: 0.7; cursor: not-allowed; }
  body.light .sheets-sync-btn {
    background: rgba(0,0,0,0.05); color: var(--text2); border-color: var(--border2);
  }
  body.light .sheets-sync-btn:hover { background: rgba(0,0,0,0.09); color: var(--text); }

  /* Currency selector */
  .currency-select {
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--radius);
    padding: 7px 10px;
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    -webkit-appearance: none;
  }
  .currency-select:hover { background: rgba(255,255,255,0.13); color: #fff; }
  .currency-select option { background: #1A1D27; color: #F0F2FF; }

  .chpw-btn {
    display: flex; align-items: center; gap: 5px;
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.6);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--radius);
    padding: 9px 14px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    transition: all 0.2s;
    letter-spacing: 0.01em;
  }
  .chpw-btn:hover { background: rgba(255,255,255,0.13); color: #fff; border-color: rgba(255,255,255,0.25); }

  /* Change password modal */
  .chpw-field-label { display: block; font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
  .chpw-input {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border2);
    border-radius: var(--radius); font-size: 14px; font-family: 'Outfit', sans-serif;
    background: var(--surface2); color: var(--text);
    transition: border-color 0.15s, box-shadow 0.15s; margin-bottom: 12px;
    box-sizing: border-box;
  }
  .chpw-input::placeholder { color: var(--text3); }
  .chpw-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,0.2); background: var(--surface3); }
  .chpw-strength { height: 3px; border-radius: 99px; margin-top: -8px; margin-bottom: 12px; transition: width 0.3s, background 0.3s; width: 0; }

  /* First-time setup overlay — blocks everything until password is set */
  .setup-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(8,10,20,0.97);
    z-index: 600;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
  }
  .setup-overlay.open { display: flex; }
  .setup-box {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 36px 32px 28px;
    width: 420px;
    max-width: 92vw;
    box-shadow: 0 24px 64px rgba(0,0,0,0.7), var(--glow-accent);
    text-align: center;
    animation: pop 0.25s ease;
  }
  .setup-icon { font-size: 42px; margin-bottom: 14px; }
  .setup-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.02em; }
  .setup-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; line-height: 1.6; }
  .setup-fields { text-align: left; }

  .table-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow);
    margin-bottom: 24px;
    position: relative;
  }
  .table-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2), var(--green));
    z-index: 1;
  }
  .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  table { width: 100%; border-collapse: separate; border-spacing: 0; }

  thead { background: var(--surface2); }

  th {
    padding: 11px 12px;
    text-align: left;
    font-size: 10px;
    font-weight: 700;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.09em;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  th:first-child { border-radius: 0; }
  th:nth-child(1) { width: 88px; }   /* Date */
  th:nth-child(2) { width: 140px; }  /* Borrower */
  th:nth-child(3), th:nth-child(4), th:nth-child(5), th:nth-child(6) { width: 80px; } /* amounts */
  th:nth-child(7) { width: 84px; }   /* Status */
  th:nth-child(8) { width: 88px; }   /* Last Updated */
  th:nth-child(9) { width: 56px; }   /* Actions */

  td {
    padding: 12px 12px;
    font-size: 13px;
    color: var(--text);
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
    transition: background 0.15s;
  }

  tbody tr:last-child td { border-bottom: none; }

  /* Alternating row colors — visually distinctive */
  tbody tr:nth-child(odd) td {
    background: var(--surface);
  }
  tbody tr:nth-child(even) td {
    background: #1E2235;
    border-bottom-color: #2A2F4A;
  }
  tbody tr:nth-child(odd) td:first-child { border-left: 2px solid transparent; }
  tbody tr:nth-child(even) td:first-child { border-left: 2px solid rgba(108,99,255,0.25); }

  tbody tr:hover td {
    background: rgba(108,99,255,0.12) !important;
    border-left-color: var(--accent) !important;
  }

  .mono { font-family: 'JetBrains Mono', monospace; font-size: 13px; }
  .muted { color: var(--text2); }

  .name-cell { font-weight: 600; font-size: 13px; }
  .name-cell .note-text { font-size: 11px; color: var(--text3); font-weight: 400; margin-top: 2px; display: block; }

  /* Amount cells */
  .amt-lent   { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 500; color: var(--text); }
  .amt-overdue { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 700; color: var(--purple); }
  .amt-overdue-empty { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text3); }
  .amt-ret    { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; color: var(--green); text-shadow: 0 0 8px rgba(0,212,170,0.3); }
  .amt-pend   { font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600; }
  .amt-pend.has-pending { color: var(--red); }
  .amt-pend.no-pending  { color: var(--text3); }

  /* Progress bar inside pending cell */
  .pend-wrap { display: flex; flex-direction: column; gap: 4px; }
  .pend-bar-bg { height: 4px; background: var(--surface3); border-radius: 99px; overflow: hidden; width: 60px; }
  .pend-bar-fill { height: 100%; border-radius: 99px; transition: width 0.4s ease; }

  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px;
    border-radius: 20px;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .badge::before { content: ''; width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }
  .badge-returned { background: var(--green-light); color: var(--green); border: 1px solid rgba(0,212,170,0.2); }
  .badge-returned::before { background: var(--green); box-shadow: 0 0 4px var(--green); }
  .badge-pending  { background: var(--amber-light); color: var(--amber); border: 1px solid rgba(255,181,71,0.2); }
  .badge-pending::before  { background: var(--amber); box-shadow: 0 0 4px var(--amber); }
  .badge-overdue  { background: var(--purple-light); color: var(--purple); border: 1px solid rgba(185,127,255,0.2); }
  .badge-overdue::before  { background: var(--purple); box-shadow: 0 0 4px var(--purple); }

  .del-btn, .edit-btn {
    background: none; border: none; cursor: pointer;
    color: var(--text3);
    padding: 6px 9px;
    border-radius: 7px;
    transition: background 0.12s, color 0.12s, transform 0.1s;
    font-size: 14px;
    line-height: 1;
  }

  .del-btn:hover    { background: var(--red-light); color: var(--red); transform: scale(1.1); }
  .edit-btn:hover   { background: var(--accent-light); color: var(--accent); transform: scale(1.1); box-shadow: 0 0 8px rgba(108,99,255,0.3); }
  .topup-btn        { background: none; border: none; cursor: pointer; color: var(--text3); padding: 6px 9px; border-radius: 7px; transition: background 0.12s, color 0.12s, transform 0.1s; font-size: 13px; line-height: 1; font-weight: 700; }
  .topup-btn:hover  { background: var(--amber-light); color: var(--amber); transform: scale(1.1); }




  /* Dashboard summary panel */
  .dashboard-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px 22px;
    margin-bottom: 24px;
    box-shadow: var(--shadow);
  }
  .dashboard-panel-title {
    font-size: 11px; font-weight: 700; color: var(--text3);
    text-transform: uppercase; letter-spacing: 0.09em; margin-bottom: 14px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .dashboard-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
  .dash-item { background: var(--surface2); border-radius: var(--radius); padding: 12px 14px; border: 1px solid var(--border); }
  .dash-item-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 5px; }
  .dash-item-val { font-size: 15px; font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .dash-borrower-list { margin-top: 12px; }
  .dash-borrower-row { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 0.5px solid var(--border); }
  .dash-borrower-row:last-child { border-bottom: none; }
  .dash-borrower-name { flex: 1; font-size: 13px; font-weight: 500; }
  .dash-borrower-bar-wrap { flex: 2; height: 5px; background: var(--surface3); border-radius: 99px; overflow: hidden; }
  .dash-borrower-bar { height: 100%; border-radius: 99px; background: linear-gradient(90deg, var(--accent), var(--accent2)); }
  .dash-borrower-amt { font-size: 12px; font-family: 'JetBrains Mono', monospace; color: var(--red); min-width: 70px; text-align: right; }
  @media (max-width: 640px) { .dashboard-grid { grid-template-columns: repeat(2,1fr); } }

  /* Due date badge */
  .due-badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 600; margin-top: 3px; }
  .due-badge.overdue-due { background: var(--red-light); color: var(--red); }
  .due-badge.due-soon    { background: var(--amber-light); color: var(--amber); }
  .due-badge.due-ok      { background: var(--green-light); color: var(--green); }


  /* 3-way view toggle */
  .view-toggle { display: flex; background: var(--surface2); border: 1px solid var(--border2); border-radius: var(--radius); padding: 3px; gap: 2px; }
  .view-toggle-btn {
    padding: 7px 16px; border: none; border-radius: 7px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: 'Outfit', sans-serif; color: var(--text2);
    background: transparent; transition: all 0.2s; white-space: nowrap;
  }
  .view-toggle-btn.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .view-toggle-btn.active.all    { color: var(--accent); }
  .view-toggle-btn.active.active-tab { color: var(--amber); }
  .view-toggle-btn.active.archived { color: var(--purple); }
  .toggle-count { display: inline-block; background: currentColor; color: var(--surface); border-radius: 10px; font-size: 10px; padding: 1px 6px; margin-left: 4px; font-weight: 700; opacity: 0.85; }

  /* Search & filter bar */
  .search-filter-bar {
    display: flex; align-items: center; gap: 10px;
    flex-wrap: wrap; margin-bottom: 14px;
  }
  .search-input-wrap { position: relative; flex: 1; min-width: 200px; }
  .search-input-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); width: 15px; height: 15px; pointer-events: none; }
  .search-input {
    width: 100%; padding: 9px 12px 9px 32px;
    border: 1px solid var(--border2); border-radius: var(--radius);
    background: var(--surface2); color: var(--text); font-size: 13px;
    font-family: 'Outfit', sans-serif; transition: all 0.15s;
  }
  .search-input::placeholder { color: var(--text3); }
  .search-input:focus { outline: none; border-color: var(
